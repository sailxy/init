services:
  busybox:
    image: busybox
    container_name: busybox
    restart: always
    command: ["tail", "-f", "/dev/null"]
  netshoot:
    image: nicolaka/netshoot
    container_name: netshoot
    restart: always
    command: ["sleep", "infinity"]
  nginx:
    image: nginx
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - /opt/apps/nginx/html:/usr/share/nginx/html
      - /opt/apps/nginx/conf.d:/etc/nginx/conf.d
      - /opt/apps/nginx/nginx.conf:/etc/nginx/nginx.conf
      - /opt/apps/nginx/log:/var/log/nginx
  postgres:
    image: postgres
    container_name: postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
  mysql:
    image: mysql
    container_name: mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
    volumes:
      - mysql-data:/var/lib/mysql
      - /opt/apps/mysql/conf.d:/etc/mysql/conf.d
  redis:
    image: redis
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
  rabbitmq:
    image: rabbitmq:management
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin
  asynq:
    image: redis
    container_name: asynq
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - asynq-data:/data
  asynqmon:
    image: hibiken/asynqmon
    container_name: asynqmon
    restart: always
    depends_on:
      - asynq
    ports:
      - "8080:8080"
    command: ["--redis-addr=asynq:6379"]

  jaeger:
    image: jaegertracing/all-in-one
    container_name: jaeger
    restart: always
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
      - "5778:5778"
      - "9411:9411"

networks:
  default:
    name: infra-network
    external: true

volumes:
  postgres-data:
  mysql-data:
  redis-data:
  asynq-data:
