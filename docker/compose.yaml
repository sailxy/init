services:
  busybox:
    image: busybox
    container_name: busybox
    restart: always
    command: ["tail", "-f", "/dev/null"]
  netshoot:
    image: nicolaka/netshoot
    container_name: netshoot
    restart: always
    command: ["sleep", "infinity"]

  nginx:
    image: nginx:1.30
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ~/apps/nginx/html:/usr/share/nginx/html
      - ~/apps/nginx/conf.d:/etc/nginx/conf.d
      - ~/apps/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ~/apps/nginx/log:/var/log/nginx

  postgres:
    image: postgres:18
    container_name: postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres-data:/var/lib/postgresql
  mysql:
    image: mysql:8.4
    container_name: mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
    volumes:
      - mysql-data:/var/lib/mysql
      - ~/apps/mysql/conf.d:/etc/mysql/conf.d
  redis:
    image: redis:8.8
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
  rabbitmq:
    image: rabbitmq:4.3-management
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin
  asynq:
    image: redis:8.8
    container_name: asynq
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - asynq-data:/data
  asynqmon:
    image: hibiken/asynqmon:0.7.2
    platform: linux/amd64
    container_name: asynqmon
    restart: always
    depends_on:
      - asynq
    ports:
      - "8080:8080"
    command: ["--redis-addr=asynq:6379"]

  jaeger:
    image: jaegertracing/all-in-one
    container_name: jaeger
    restart: always
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
      - "5778:5778"
      - "9411:9411"

  loki:
    image: grafana/loki:3.7.2
    container_name: loki
    command: -config.file=/etc/loki/loki-config.yaml
    ports: ["3100:3100"]
    volumes:
      - ~/apps/loki/loki-config.yaml:/etc/loki/loki-config.yaml
      - loki-data:/loki
  alloy:
    image: grafana/alloy:v1.16.1
    container_name: alloy
    command: run /etc/alloy/config.alloy --server.http.listen-addr=0.0.0.0:12345
    ports: ["12345:12345"]
    volumes:
      - ~/apps/alloy/config.alloy:/etc/alloy/config.alloy
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on: [loki]
  grafana:
    image: grafana/grafana:13.0.1
    container_name: grafana
    ports: ["3000:3000"]
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ~/apps/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on: [loki]

networks:
  default:
    name: infra-network
    external: true

volumes:
  postgres-data:
  mysql-data:
  redis-data:
  asynq-data:
  loki-data:
  grafana-data:
